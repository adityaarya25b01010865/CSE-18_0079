<!DOCTYPE html>
<html>
<head>
    <title>React Components using JSX and Props</title>

    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel CDN -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .student-card{
            background: white;
            width: 280px;
            margin: 15px auto;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .student-card h2{
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">

        // Student Component
        function Student(props){
            return(
                <div className="student-card">
                    <h2>{props.name}</h2>
                    <p>Course: {props.course}</p>
                    <p>Marks: {props.marks}</p>
                </div>
            );
        }

        // App Component
        function App(){
            return(
                <div>
                    <h1>Student Information</h1>

                    <Student
                        name="Akash Agrawal"
                        course="B.Tech CSE"
                        marks="88"
                    />

                    <Student
                        name="Rahul Sharma"
                        course="B.Tech IT"
                        marks="92"
                    />

                    <Student
                        name="Priya Singh"
                        course="B.Tech AI"
                        marks="85"
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(
            document.getElementById("root")
        );

        root.render(<App />);

    </script>

</body>
</html>
